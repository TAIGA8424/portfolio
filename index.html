<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>TAIGA</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

:root{
--gold:#d7b36a;
--gold-light:#f4d28b;
--wood-1:#7c4e1f;
--wood-2:#4a2d12;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Cinzel',serif;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;
position:relative;

background-image:
linear-gradient(
rgba(0,0,0,.45),
rgba(0,0,0,.82)
),
url("https://images.unsplash.com/photo-1518562180175-34a163b1a9a6?q=80&w=2070&auto=format&fit=crop");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* FOG */

.fog{

position:absolute;
width:200%;
height:200%;

background:
radial-gradient(
circle,
rgba(255,255,255,.04),
transparent 70%
);

animation:fog 40s linear infinite;

pointer-events:none;
}

@keyframes fog{

from{
transform:translateX(-10%);
}

to{
transform:translateX(10%);
}

}

/* TORCHES */

.torch{

position:absolute;

top:50%;

font-size:48px;

transform:translateY(-50%);

filter:
drop-shadow(0 0 20px orange);

animation:flicker 1.5s infinite alternate;
}

.left{
left:20px;
}

.right{
right:20px;
}

@keyframes flicker{

from{
opacity:.8;
}

to{
opacity:1;
transform:translateY(-50%) scale(1.05);
}

}

/* PANEL */

.panel{

width:min(92vw,520px);

padding:24px;

border-radius:22px;

border:3px solid var(--gold);

background:
linear-gradient(
180deg,
rgba(75,45,20,.95),
rgba(25,15,8,.95)
);

backdrop-filter:blur(6px);

box-shadow:
0 0 25px rgba(255,200,120,.2),
0 0 60px rgba(0,0,0,.7);

text-align:center;

z-index:10;

transition:.25s;
}

.title{

font-size:clamp(1.4rem,4vw,2rem);

color:var(--gold-light);

letter-spacing:3px;

margin-bottom:20px;

text-shadow:
0 0 15px rgba(255,220,120,.5);
}

/* AVATAR */

.avatar{

width:150px;
height:150px;

margin:auto;

padding:6px;

border-radius:50%;

background:
radial-gradient(circle,#9b7038,#4a2f16);

border:3px solid var(--gold);

box-shadow:
0 0 25px rgba(255,210,120,.4);

transition:.3s;
}

.avatar:hover{

transform:
scale(1.05);

box-shadow:
0 0 45px rgba(255,220,120,.7);
}

.avatar img{

width:100%;
height:100%;

border-radius:50%;

object-fit:cover;
}

.name{

margin-top:16px;

font-size:1.25rem;

color:#fff0c8;
}

.rank{

margin-top:6px;

font-size:.8rem;

letter-spacing:2px;

color:#b89c69;
}

/* BUTTONS */

.links{

display:flex;
flex-direction:column;

gap:14px;

margin-top:26px;
}

.btn{

display:flex;
align-items:center;
justify-content:center;

gap:12px;

padding:16px;

border-radius:12px;

text-decoration:none;

color:#f5e6bd;

border:2px solid var(--gold);

background:
linear-gradient(
var(--wood-1),
var(--wood-2)
);

font-size:1rem;

transition:.25s;
}

.btn:hover{

transform:
translateY(-4px)
scale(1.04);

box-shadow:
0 0 25px rgba(255,210,120,.5);
}

.btn i{

font-size:1.25rem;
}

.section{

margin-top:28px;
}

.section-title{

color:var(--gold);

font-size:.8rem;

letter-spacing:4px;

margin-bottom:12px;
}

.donate{

background:
linear-gradient(
#d5a84a,
#8b5c18
);

color:white;
}

/* MUSIC */

.music{

position:absolute;

top:15px;
right:15px;

width:48px;
height:48px;

border:none;

border-radius:50%;

cursor:pointer;

background:
rgba(0,0,0,.5);

color:white;

font-size:18px;

z-index:100;
}

/* EMBERS */

.ember{

position:absolute;

bottom:-10px;

background:#ffbe55;

border-radius:50%;

box-shadow:
0 0 10px orange;

pointer-events:none;

animation:rise linear infinite;
}

@keyframes rise{

from{
transform:translateY(0);
opacity:1;
}

to{
transform:translateY(-110vh);
opacity:0;
}
}

@media(max-width:768px){

.torch{
display:none;
}

.avatar{
width:130px;
height:130px;
}

.btn{
padding:18px;
}

}

</style>

</head>

<body>

<div class="fog"></div>

<button class="music" id="musicBtn">
<i class="fa-solid fa-music"></i>
</button>

<div class="panel" id="panel">

<div class="title">
TAIGA
</div>

<div class="avatar">
<img src="https://scontent.fdad3-6.fna.fbcdn.net/v/t39.30808-6/473694437_1998102770710700_8327637732090303592_n.jpg?stp=dst-jpg_tt6&cstp=mx1920x1920&ctp=s1920x1920&_nc_cat=107&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=UjBFIwadfe0Q7kNvwEVzQT-&_nc_oc=Adps9nSLLRHHZ3XCjQgyPhBdeAIiCA0nJaXjtSXDqAGLaKgGmYOUeMRwiBFVvh1oTUe8JE-xxGjAFrZvT8oVkX7-&_nc_zt=23&_nc_ht=scontent.fdad3-6.fna&_nc_gid=Gu5IOoDS2XYUCZWUn3x12A&_nc_ss=7b2a8&oh=00_Af-iSqxyCVl7k4U7V-iebQdOTQ003qLM6jcv0CQGZHTFCA&oe=6A3717BD">
</div>

<div class="name">
NAVIGATION PAGE
</div>

<div class="rank">
MASTER OF THE GUILD
</div>

<div class="links">

<a href="https://www.youtube.com/@TAIGA84"
target="_blank"
class="btn"> <i class="fab fa-youtube"></i>
YouTube </a>

<a href="https://www.facebook.com/thinh.inh.484261"
target="_blank"
class="btn"> <i class="fab fa-facebook-f"></i>
Facebook </a>

<a href="https://www.tiktok.com/@taiga_74164"
target="_blank"
class="btn"> <i class="fab fa-tiktok"></i>
TikTok </a>

</div>

<div class="section">

<div class="section-title">
TREASURY
</div>

<a href="https://zypage.com/taiga84"
target="_blank"
class="btn donate">

<i class="fa-solid fa-coins"></i>

Donate

</a>

</div>

</div>

<audio id="bgMusic" loop>
<source src="YOUR_MUSIC_FILE.mp3" type="audio/mpeg">
</audio>

<script>

const emberCount =
window.innerWidth < 768 ? 20 : 40;

for(let i=0;i<emberCount;i++){

const ember =
document.createElement("div");

ember.classList.add("ember");

const size =
Math.random()*5+2;

ember.style.width =
size+"px";

ember.style.height =
size+"px";

ember.style.left =
Math.random()*100+"vw";

ember.style.animationDuration =
(Math.random()*8+8)+"s";

document.body.appendChild(ember);
}

/* DESKTOP PARALLAX */

if(window.innerWidth > 768){

document.addEventListener(
"mousemove",
(e)=>{

const x =
(e.clientX/window.innerWidth-.5)*10;

const y =
(e.clientY/window.innerHeight-.5)*10;

document
.getElementById("panel")
.style.transform =
`translate(${x}px,${y}px)`;

});

}

/* MUSIC */

const music =
document.getElementById("bgMusic");

document.addEventListener(
"click",
()=>{

if(music.paused){

music.play().catch(()=>{});

}

},
{once:true}
);

document
.getElementById("musicBtn")
.addEventListener(
"click",
()=>{

if(music.paused){

music.play();

}else{

music.pause();

}

}
);

</script>

</body>
</html>
